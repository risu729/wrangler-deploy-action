# ref: https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml

accept = [
  "100..=103",
  "200..=299",
  # GitHub API rate limit
  "429",
]

exclude_path = [
  ".git",
  "mise.lock",
]

exclude = [
  # Generated test URLs.
  "https://[a-z0-9-]+\\.example\\.workers\\.dev",
  # Credential-bearing Git remote template in the release workflow.
  "https://x-access-token.*",
]

exclude_all_private = true
