# ref: https://yamllint.readthedocs.io/en/stable/configuration.html
extends: default
ignore-from-file: .gitignore
rules:
  comments:
    min-spaces-from-content: 1 # follow yamlfmt
  document-start:
    present: false
  line-length: disable # cannot disable only for URLs and action pins
  truthy:
    check-keys: false
